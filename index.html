<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy — Kit For Kids Apps</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8f6f3;
            color: #2c2c2c;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 56px 24px 40px;
            flex: 1;
            width: 100%;
        }

        .app-switcher {
            display: flex;
            gap: 8px;
            padding: 6px;
            background: #fff;
            border: 1px solid #e8e4df;
            border-radius: 999px;
            margin: 0 auto 28px;
            width: fit-content;
            max-width: 100%;
        }

        .app-tab {
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: #6b6560;
            cursor: pointer;
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            padding: 9px 16px;
            transition: background 0.2s ease, color 0.2s ease;
            white-space: nowrap;
        }

        .app-tab.active {
            background: #7c6dab;
            color: #fff;
        }

        .app-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border: 1px solid #e8e4df;
            border-radius: 40px;
            padding: 6px 16px 6px 6px;
            margin-bottom: 32px;
            font-size: 14px;
            color: #6b6560;
        }

        .app-badge .icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #7c6dab, #a78bba);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .dates {
            font-size: 14px;
            color: #7a756f;
            margin-bottom: 12px;
        }

        .intro {
            font-size: 16px;
            color: #7a756f;
            margin-bottom: 40px;
        }

        .section {
            background: #fff;
            border: 1px solid #e8e4df;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 16px;
        }

        .section h2 {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .section p {
            font-size: 15px;
            color: #4a4a4a;
            margin-bottom: 12px;
        }

        .section p:last-child {
            margin-bottom: 0;
        }

        .section ul {
            list-style: none;
            padding: 0;
            margin: 8px 0 12px;
        }

        .section ul li {
            font-size: 15px;
            color: #4a4a4a;
            padding: 4px 0 4px 20px;
            position: relative;
        }

        .section ul li::before {
            content: "•";
            position: absolute;
            left: 4px;
            color: #7c6dab;
            font-weight: 600;
        }

        .contact-box {
            text-align: center;
            padding: 32px 24px;
            color: #7a756f;
            font-size: 14px;
        }

        .contact-box a {
            color: #7c6dab;
            text-decoration: none;
            font-weight: 500;
        }

        .contact-box a:hover {
            text-decoration: underline;
        }

        .page-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .page-link {
            display: inline-block;
            font-size: 14px;
            color: #7c6dab;
            text-decoration: none;
        }

        .page-link:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 24px;
            font-size: 13px;
            color: #b0aaa3;
            border-top: 1px solid #e8e4df;
        }

        @media (max-width: 520px) {
            .container {
                padding-top: 32px;
            }

            .app-switcher {
                width: 100%;
            }

            .app-tab {
                flex: 1;
                padding-left: 10px;
                padding-right: 10px;
            }

            h1 {
                font-size: 29px;
            }

            .section {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="app-switcher" aria-label="Choose application">
            <button class="app-tab active" type="button" data-app="hushaby">Hushaby</button>
            <button class="app-tab" type="button" data-app="onceupon">OnceUpon</button>
        </div>

        <div class="app-badge">
            <div class="icon" id="appIcon">🌙</div>
            <span id="appName">Hushaby: Baby Sleep Sounds</span>
        </div>

        <h1>Privacy Policy</h1>
        <p class="dates" id="dates"></p>
        <p class="intro" id="intro"></p>

        <div id="sections"></div>

        <div class="contact-box">
            <p>Have questions? Contact us at<br><a id="emailLink" href=""></a></p>
            <div class="page-links">
                <a class="page-link" id="deleteDataLink" href="./delete-data.html">How to delete your data →</a>
                <a class="page-link" id="termsLink" href="./terms-of-use.html">Terms of Use →</a>
            </div>
        </div>
    </main>

    <footer id="footer"></footer>

                        title: '3. Purchases and subscriptions',

                            'The App uses RevenueCat to help manage subscriptions, purchase validation, subscription status, entitlements, and restore-purchase functionality. RevenueCat and the applicable app store may process app user or installation identifiers, product identifiers, purchase and entitlement status, transaction or receipt information, device, platform, app version, and diagnostic information needed to provide subscription services.'

                        paragraphs: [

                            'The App is configured to request child-directed treatment for ads and to use a maximum ad content rating suitable for general audiences. The App may also request non-personalized ads for interstitial reading ads. We do not knowingly use children’s personal information to create behavioral advertising profiles.',
                            'If you are located in a region where consent is required for advertising or related storage, such as the European Economic Area, the United Kingdom, or Switzerland, the App or advertising partners may need to request consent before certain advertising features are used. If consent is not obtained where required, the App should request non-personalized or limited ads where supported.'

                        title: '8. How information is shared',
                        paragraphs: [

                            'We do not require children to create an account, and we do not knowingly request children to provide their name, email address, phone number, precise location, photos, contacts, or other personal contact information directly in the App.',

                            'If you are a parent or guardian and believe that a child has provided personal information to us by email or another support channel, contact us at kitforkidsapps@gmail.com. We will take reasonable steps to review, delete, or limit that information, unless retention is required by law or necessary for safety, fraud prevention, security, or dispute resolution.'

                    {
                        title: '11. Your choices',
                        paragraphs: [

                        paragraphs: [

        const tabs = document.querySelectorAll('.app-tab');
        const appIcon = document.getElementById('appIcon');
        const appName = document.getElementById('appName');
        const dates = document.getElementById('dates');
        const intro = document.getElementById('intro');
        const sections = document.getElementById('sections');
        const emailLink = document.getElementById('emailLink');
        const footer = document.getElementById('footer');
        const termsLink = document.getElementById('termsLink');
        const deleteDataLink = document.getElementById('deleteDataLink');

        function sectionTemplate(section) {
            const listHtml = section.list
                ? `<ul>${section.list.map(item => `<li>${item}</li>`).join('')}</ul>`
                : '';

            const listAfter = Number.isInteger(section.listAfter)
                ? section.listAfter
                : section.paragraphs.length;

            const content = section.paragraphs
                .map((paragraph, index) => {
                    const paragraphHtml = `<p>${paragraph}</p>`;
                    return index + 1 === listAfter ? paragraphHtml + listHtml : paragraphHtml;
                })
                .join('');

            return `
                <div class="section">
                    <h2>${section.title}</h2>
                    ${content}
                </div>
            `;
        }

        function setApp(appKey, updateUrl = true) {
            const policy = policies[appKey] || policies.hushaby;

            document.title = policy.title;
            appIcon.textContent = policy.icon;
            appName.textContent = policy.appName;
            dates.textContent = policy.dates;
            intro.textContent = policy.intro;
            sections.innerHTML = policy.sections.map(sectionTemplate).join('');
            emailLink.href = `mailto:${policy.email}`;
            emailLink.textContent = policy.email;
            footer.textContent = policy.footer;

            termsLink.href = `./terms-of-use.html?app=${appKey}`;
            deleteDataLink.href = `./delete-data.html?app=${appKey}`;

            tabs.forEach(tab => {
                tab.classList.toggle('active', tab.dataset.app === appKey);
            });

            if (updateUrl) {
                const url = new URL(window.location.href);
                url.searchParams.set('app', appKey);
                window.history.replaceState({}, '', url);
            }
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => setApp(tab.dataset.app));
        });

        const params = new URLSearchParams(window.location.search);
        const initialApp = params.get('app') === 'onceupon' ? 'onceupon' : 'hushaby';
        setApp(initialApp, false);
    </script>
</body>
</html>
