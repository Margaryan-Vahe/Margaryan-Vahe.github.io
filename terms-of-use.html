<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Use - Kit For Kids Apps</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8f6f3;
            color: #2c2c2c;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 56px 24px 40px;
            flex: 1;
            width: 100%;
        }

        .app-switcher {
            display: flex;
            gap: 8px;
            padding: 6px;
            background: #fff;
            border: 1px solid #e8e4df;
            border-radius: 999px;
            margin: 0 auto 28px;
            width: fit-content;
            max-width: 100%;
        }

        .app-tab {
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: #6b6560;
            cursor: pointer;
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            padding: 9px 16px;
            transition: background 0.2s ease, color 0.2s ease;
            white-space: nowrap;
        }

        .app-tab.active {
            background: #7c6dab;
            color: #fff;
        }

        .app-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border: 1px solid #e8e4df;
            border-radius: 40px;
            padding: 6px 16px 6px 6px;
            margin-bottom: 32px;
            font-size: 14px;
            color: #6b6560;
        }

        .app-badge .icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #7c6dab, #a78bba);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .dates {
            font-size: 14px;
            color: #7a756f;
            margin-bottom: 12px;
        }

        .intro {
            font-size: 16px;
            color: #7a756f;
            margin-bottom: 40px;
        }

        .section {
            background: #fff;
            border: 1px solid #e8e4df;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 16px;
        }

        .section h2 {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .section p {
            font-size: 15px;
            color: #4a4a4a;
            margin-bottom: 12px;
        }

        .section p:last-child { margin-bottom: 0; }

        .contact-box {
            text-align: center;
            padding: 32px 24px;
            color: #7a756f;
            font-size: 14px;
        }

        .contact-box a {
            color: #7c6dab;
            text-decoration: none;
            font-weight: 500;
        }

        .contact-box a:hover,
        .page-link:hover {
            text-decoration: underline;
        }

        .page-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .page-link {
            display: inline-block;
            font-size: 14px;
            color: #7c6dab;
            text-decoration: none;
        }

        footer {
            text-align: center;
            padding: 24px;
            font-size: 13px;
            color: #b0aaa3;
            border-top: 1px solid #e8e4df;
        }

        @media (max-width: 520px) {
            .container { padding-top: 32px; }
            .app-switcher { width: 100%; }
            .app-tab { flex: 1; padding-left: 10px; padding-right: 10px; }
            h1 { font-size: 29px; }
            .section { padding: 22px; }
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="app-switcher" aria-label="Choose application">
            <button class="app-tab active" type="button" data-app="hushaby">Hushaby</button>
            <button class="app-tab" type="button" data-app="onceupon">OnceUpon</button>
        </div>

        <div class="app-badge">
            <div class="icon" id="appIcon">🌙</div>
            <span id="appName">Hushaby: Baby Sleep Sounds</span>
        </div>

        <h1>Terms of Use</h1>
        <p class="dates" id="dates"></p>
        <p class="intro" id="intro"></p>

        <div id="sections"></div>

        <div class="contact-box">

            <div class="page-links">
                <a class="page-link" id="privacyLink" href="./index.html">Privacy Policy</a>
                <a class="page-link" id="deleteDataLink" href="./delete-data.html">Delete Your Data</a>

        </div>

                        'You also agree not to attempt to bypass subscriptions, ads, security measures, access controls, or technical limitations.'
                    ]],
                    ['11. Updates, No Warranty, and Limitation of Liability', [

                        'The App is provided on an as is and as available basis. To the maximum extent permitted by applicable law, we disclaim warranties and limit liability for indirect, incidental, special, consequential, exemplary, or punitive damages.'
                    ]],
                    ['12. Apple App Store Additional Terms', [
                        'If you downloaded the App from the Apple App Store, you acknowledge that these Terms are between you and us, not Apple. Apple is not responsible for the App or its content. Apple and Apple’s subsidiaries are third-party beneficiaries of these Terms and may enforce these Terms against you.',

                        'We, not Apple, are responsible for addressing claims relating to the App or your possession and use of the App, including product liability claims, consumer protection claims, legal or regulatory claims, and intellectual property claims.',
                        'You represent and warrant that you are not located in a country or region subject to a U.S. government embargo or designated by the U.S. government as a terrorist-supporting country, and that you are not listed on any U.S. government list of prohibited or restricted parties.'

                    ]],

                    ]],
                    ['15. Contact', [
                        'If you have questions about these Terms or the App, contact us at kitforkidsapps@gmail.com.'
                    ]]

            }
        };

        const tabs = document.querySelectorAll('.app-tab');
        const appIcon = document.getElementById('appIcon');
        const appName = document.getElementById('appName');
        const dates = document.getElementById('dates');
        const intro = document.getElementById('intro');
        const sections = document.getElementById('sections');
        const emailLink = document.getElementById('emailLink');
        const footer = document.getElementById('footer');
        const privacyLink = document.getElementById('privacyLink');
        const deleteDataLink = document.getElementById('deleteDataLink');

        function sectionTemplate(section) {
            const [title, paragraphs] = section;
            return `
                <div class="section">
                    <h2>${title}</h2>
                    ${paragraphs.map(paragraph => `<p>${paragraph}</p>`).join('')}
                </div>
            `;
        }

        function setApp(appKey, updateUrl = true) {
            const data = terms[appKey] || terms.hushaby;

            document.title = data.title;
            appIcon.textContent = data.icon;
            appName.textContent = data.appName;
            dates.textContent = data.dates;
            intro.textContent = data.intro;
            sections.innerHTML = data.sections.map(sectionTemplate).join('');
            emailLink.href = `mailto:${data.email}`;
            emailLink.textContent = data.email;
            footer.textContent = data.footer;
            privacyLink.href = `./index.html?app=${appKey}`;
            deleteDataLink.href = `./delete-data.html?app=${appKey}`;

            tabs.forEach(tab => {
                tab.classList.toggle('active', tab.dataset.app === appKey);
            });

            if (updateUrl) {
                const url = new URL(window.location.href);
                url.searchParams.set('app', appKey);
                window.history.replaceState({}, '', url);
            }
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => setApp(tab.dataset.app));
        });

        const params = new URLSearchParams(window.location.search);
        const initialApp = params.get('app') === 'onceupon' ? 'onceupon' : 'hushaby';
        setApp(initialApp, false);

</html>
